<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Company Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFv47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h4 mb-2">Company Registration</h1>
                        <p class="text-muted small mb-4">Fill in the required company details below.</p>

                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                        {% endif %}
                        {% endwith %}

                        <form method="POST" action="{{ url_for('register') }}">
                            <input type="hidden" name="account_type" value="company">

                            <div class="mb-3">
                                <label class="form-label">Company Name</label>
                                <input class="form-control" name="company_name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input class="form-control" type="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input class="form-control" type="password" name="password" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Industry</label>
                                <input class="form-control" name="industry" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Location</label>
                                <input class="form-control" name="location" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Website</label>
                                <input class="form-control" name="website" placeholder="Optional">
                            </div>

                            <button class="btn btn-success w-100" type="submit">Register Company</button>
                        </form>

                        <div class="d-flex justify-content-between mt-3">
                            <a href="{{ url_for('company_login_page') }}">Already have an account?</a>
                            <a href="{{ url_for('register_page') }}">Back</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
