<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Placement Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">
    <main class="container-xl py-5">
        <div class="row justify-content-center mb-3">
            <div class="col-12 text-center">
                <h1 class="h3">Login</h1>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="row justify-content-center mb-3">
            <div class="col-12 col-xl-10">
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} mb-2">{{ message }}</div>
                {% endfor %}
            </div>
        </div>
        {% endif %}
        {% endwith %}

        <div class="row g-4 justify-content-center">
            <div class="col-12 col-md-6 col-xl-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h2 class="h4 mb-3">Student Login</h2>
                        <form action="{{ url_for('login') }}" method="POST">
                            <div class="mb-2"><input type="email" class="form-control" name="email" placeholder="Student Email" required></div>
                            <div class="mb-2"><input type="password" class="form-control" name="password" placeholder="Password" required></div>
                            <button type="submit" class="btn btn-primary btn-sm">Login</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-xl-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h2 class="h4 mb-3">Company Login</h2>
                        <form action="{{ url_for('company_login') }}" method="POST">
                            <div class="mb-2"><input type="email" class="form-control" name="email" placeholder="Company Email" required></div>
                            <div class="mb-2"><input type="password" class="form-control" name="password" placeholder="Password" required></div>
                            <button type="submit" class="btn btn-primary btn-sm">Login</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-xl-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h2 class="h4 mb-3">Admin Login</h2>
                        <form action="{{ url_for('admin_login') }}" method="POST">
                            <div class="mb-2"><input type="text" class="form-control" name="username" placeholder="Admin Username" required></div>
                            <div class="mb-2"><input type="password" class="form-control" name="password" placeholder="Password" required></div>
                            <button type="submit" class="btn btn-primary btn-sm">Login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="{{ url_for('register_page') }}" class="btn btn-success btn-sm">Create Account</a>
            <a href="{{ url_for('access') }}" class="btn btn-outline-secondary btn-sm">Back to Home</a>
        </div>
    </main>
</body>
</html>
