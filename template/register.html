<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Placement Portal - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-light">
    <main class="container py-5">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="row justify-content-center mb-3">
        <div class="col-12 col-lg-8">
          {% for category, message in messages %}
          <div class="alert alert-{{ category }} mb-2">{{ message }}</div>
          {% endfor %}
        </div>
      </div>
      {% endif %}
      {% endwith %}

      <div class="row g-4 justify-content-center">
        <div class="col-12 col-lg-6">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h2 class="h5">Student Registration</h2>
              <form method="POST" action="{{ url_for('register') }}" enctype="multipart/form-data">
                <input type="hidden" name="account_type" value="student">
                <div class="mb-2"><input class="form-control" name="full_name" placeholder="Full Name" required></div>
                <div class="mb-2"><input class="form-control" type="email" name="email" placeholder="Email" required></div>
                <div class="mb-2"><input class="form-control" type="password" name="password" placeholder="Password" required></div>
                <div class="mb-2"><input class="form-control" name="phone" placeholder="Phone" required></div>
                <div class="mb-2"><input class="form-control" name="course" placeholder="Course" required></div>
                <div class="mb-2"><input class="form-control" name="skills" placeholder="Skills, separated by commas"></div>
                <div class="mb-2"><input class="form-control" type="number" name="graduation_year" placeholder="Graduation Year" required></div>
                <div class="mb-2">
                  <label class="form-label">Upload Resume</label>
                  <input class="form-control" type="file" name="resume" accept=".pdf,.doc,.docx">
                  <div class="form-text">PDF, DOC, or DOCX only.</div>
                </div>
                <button class="btn btn-success btn-sm" type="submit">Register Student</button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h2 class="h5">Company Registration</h2>
              <form method="POST" action="{{ url_for('register') }}">
                <input type="hidden" name="account_type" value="company">
                <div class="mb-2"><input class="form-control" name="company_name" placeholder="Company Name" required></div>
                <div class="mb-2"><input class="form-control" type="email" name="email" placeholder="Email" required></div>
                <div class="mb-2"><input class="form-control" type="password" name="password" placeholder="Password" required></div>
                <div class="mb-2"><input class="form-control" name="industry" placeholder="Industry" required></div>
                <div class="mb-2"><input class="form-control" name="location" placeholder="Location" required></div>
                <div class="mb-2"><input class="form-control" name="website" placeholder="Website (optional)"></div>
                <button class="btn btn-success btn-sm" type="submit">Register Company</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="text-center pb-4">
      <a href="{{ url_for('login_page') }}" class="btn btn-primary btn-sm">Go to Login</a>
      <a href="{{ url_for('access') }}" class="btn btn-outline-secondary btn-sm">Back to Home</a>
    </div>
  </body>
</html>
